name: quality-gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Checkpoint quality gate (if metadata exists)
        run: python scripts/ci_gate_checkpoints.py --min-val-acc 0.90 --min-macro-f1 0.88
